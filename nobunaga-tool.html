<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>真戦ツール ⚔️</title>
  <style>
    :root {
      --bg: #0d0b08;
      --bg2: #1a1510;
      --bg3: #252018;
      --gold: #c9a227;
      --gold2: #e8c547;
      --red: #b03020;
      --red2: #d44030;
      --text: #ede8df;
      --text2: #998878;
      --border: #3a3020;
      --success: #4a9060;
      --blue: #2870a0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ---- HEADER ---- */
    .header {
      background: linear-gradient(135deg, #1a0a00 0%, #2d1800 50%, #1a0a00 100%);
      border-bottom: 2px solid var(--gold);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header-icon { font-size: 2rem; }
    .header h1 {
      font-size: 1.25rem;
      color: var(--gold);
      text-shadow: 0 0 16px rgba(201,162,39,0.6);
      letter-spacing: 0.05em;
    }
    .header .sub { font-size: 0.75rem; color: var(--text2); margin-top: 2px; }

    /* ---- TABS ---- */
    .tabs {
      display: flex;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex: 1;
      min-width: 72px;
      padding: 13px 8px;
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 0.82rem;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); background: rgba(201,162,39,0.05); }
    .tab-btn:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.04); }

    /* ---- CONTENT ---- */
    .tab-content { display: none; padding: 16px; max-width: 1100px; margin: 0 auto; }
    .tab-content.active { display: block; }

    /* ---- CARD ---- */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .card-title {
      font-size: 1rem;
      color: var(--gold);
      margin-bottom: 14px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ---- FORM ---- */
    .form-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .form-group { flex: 1; min-width: 120px; }
    .form-group label { display: block; font-size: 0.72rem; color: var(--text2); margin-bottom: 4px; }
    input, select, textarea {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--gold); }
    textarea { resize: vertical; min-height: 70px; }
    input[type="file"] { padding: 5px; }

    /* ---- BUTTONS ---- */
    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: bold;
      transition: all 0.18s;
    }
    .btn-primary { background: var(--gold); color: #1a0a00; }
    .btn-primary:hover { background: var(--gold2); transform: translateY(-1px); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { background: var(--red2); }
    .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
    .btn-sm { padding: 4px 10px; font-size: 0.76rem; }

    /* ---- STATS BAR ---- */
    .stats-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
    .stat-chip {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 13px;
      font-size: 0.8rem;
    }
    .stat-chip span { color: var(--gold); font-weight: bold; }

    /* ---- TRACKER TABLE ---- */
    .tracker-wrap { overflow-x: auto; }
    .tracker-table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    .tracker-table th {
      text-align: left;
      padding: 9px 10px;
      color: var(--gold);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .tracker-table th:hover { color: var(--gold2); }
    .tracker-table td { padding: 9px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
    .tracker-table tr:hover td { background: rgba(255,255,255,0.03); }
    .power-bar { height: 5px; background: var(--border); border-radius: 3px; margin-top: 4px; overflow: hidden; width: 80px; }
    .power-bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--red)); border-radius: 3px; transition: width 0.4s; }
    .rank-1 { color: var(--gold); font-weight: bold; }
    .rank-badge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: bold;
      margin-left: 5px;
      background: rgba(201,162,39,0.15);
      color: var(--gold);
      border: 1px solid rgba(201,162,39,0.3);
    }

    /* ---- NOTES ---- */
    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 12px;
    }
    .note-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      border-left: 3px solid var(--border);
    }
    .note-card.cat-戦略 { border-left-color: #c0392b; }
    .note-card.cat-武将 { border-left-color: #2980b9; }
    .note-card.cat-内政 { border-left-color: #27ae60; }
    .note-card.cat-外交 { border-left-color: #8e44ad; }
    .note-card.cat-その他 { border-left-color: var(--gold); }
    .note-title { font-weight: bold; font-size: 0.93rem; margin-bottom: 6px; }
    .note-body { font-size: 0.81rem; color: var(--text2); white-space: pre-wrap; line-height: 1.55; margin-bottom: 10px; }
    .note-footer { display: flex; justify-content: space-between; align-items: center; }
    .cat-tag {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 12px;
      font-size: 0.7rem;
      background: rgba(255,255,255,0.08);
      color: var(--text2);
    }
    .search-bar { position: relative; margin-bottom: 14px; }
    .search-bar input { padding-left: 34px; }
    .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 0.85rem; pointer-events: none; }

    /* ---- SIMULATOR ---- */
    .type-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .type-filter-btn {
      padding: 5px 13px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text2);
      cursor: pointer;
      font-size: 0.79rem;
      transition: all 0.18s;
    }
    .type-filter-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,162,39,0.1); }

    .selected-slot {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 10px;
      background: var(--bg3);
      border-radius: 8px;
      border: 1px dashed var(--border);
      min-height: 48px;
      margin-bottom: 14px;
      align-items: center;
    }
    .slot-tag {
      padding: 4px 11px;
      border-radius: 14px;
      font-size: 0.79rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: opacity 0.15s;
    }
    .slot-tag:hover { opacity: 0.75; }

    .tactic-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }
    .tactic-card {
      background: var(--bg3);
      border: 2px solid var(--border);
      border-radius: 9px;
      padding: 10px;
      cursor: pointer;
      transition: all 0.18s;
      text-align: center;
    }
    .tactic-card:hover { border-color: rgba(201,162,39,0.5); transform: translateY(-1px); }
    .tactic-card.selected:hover { border-color: var(--red2); background: rgba(192,57,43,0.15); }
    .tactic-card.selected { border-color: var(--gold); background: rgba(201,162,39,0.09); }
    .tactic-name { font-weight: bold; font-size: 0.9rem; }
    .tactic-type-label { font-size: 0.7rem; margin-top: 3px; }
    .tactic-effect-label { font-size: 0.7rem; color: var(--text2); margin-top: 4px; line-height: 1.4; }
    .type-攻撃 { color: #e05040; }
    .type-防御 { color: #4090c0; }
    .type-支援 { color: #50a870; }
    .type-特殊 { color: #9060c0; }

    .synergy-box {
      background: rgba(201,162,39,0.06);
      border: 1px solid rgba(201,162,39,0.4);
      border-radius: 10px;
      padding: 14px;
    }
    .synergy-box-title { font-size: 0.95rem; color: var(--gold); font-weight: bold; margin-bottom: 10px; }
    .synergy-item {
      background: var(--bg3);
      border-radius: 7px;
      padding: 10px 12px;
      margin-bottom: 8px;
      border-left: 3px solid var(--gold);
    }
    .synergy-item-name { font-weight: bold; color: var(--gold2); margin-bottom: 3px; font-size: 0.9rem; }
    .synergy-item-desc { font-size: 0.8rem; color: var(--text2); }
    .no-synergy { color: var(--text2); font-size: 0.84rem; font-style: italic; }

    /* ---- RIVALS ---- */
    .rivals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 12px;
    }
    .rival-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }
    .rival-thumb {
      width: 100%;
      height: 120px;
      object-fit: cover;
      background: var(--bg3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }
    .rival-thumb img { width: 100%; height: 120px; object-fit: cover; display: block; }
    .rival-info { padding: 10px 12px; }
    .rival-name { font-weight: bold; font-size: 0.93rem; margin-bottom: 5px; }
    .rival-stat { font-size: 0.78rem; color: var(--text2); line-height: 1.65; }
    .rival-actions { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
    .threat-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: bold;
    }
    .threat-高 { background: rgba(176,48,32,0.85); color: #fff; }
    .threat-中 { background: rgba(200,140,20,0.85); color: #111; }
    .threat-低 { background: rgba(50,140,80,0.85); color: #fff; }

    /* ---- EMPTY ---- */
    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text2);
    }
    .empty .icon { font-size: 3rem; margin-bottom: 10px; }
    .empty .msg { font-size: 0.85rem; }

    /* ---- TOAST ---- */
    .toast {
      position: fixed;
      bottom: 22px;
      right: 20px;
      background: var(--bg2);
      border: 1px solid var(--gold);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 0.84rem;
      z-index: 999;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.28s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* rank colors */
    .rank-SS { color: #e83030; font-weight:bold; }
    .rank-S  { color: #e8a020; font-weight:bold; }
    .rank-A  { color: #4090d0; }
    .rank-B  { color: #50a870; }
    .rank-C  { color: var(--text2); }
    .kind-badge {
      display:inline-block;padding:1px 6px;border-radius:8px;
      font-size:0.65rem;margin-top:3px;
      background:rgba(255,255,255,0.08);color:var(--text2);
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-icon">⚔️</div>
  <div>
    <h1>真戦ツール</h1>
    <div class="sub">信長の野望 真戦 — 友達と使えるツール</div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="showTab('tracker',this)">🗡️ 戦力</button>
  <button class="tab-btn" onclick="showTab('notes',this)">📝 メモ</button>
  <button class="tab-btn" onclick="showTab('simulator',this)">⚔️ 戦法</button>
  <button class="tab-btn" onclick="showTab('rivals',this)">🔍 ライバル</button>
</div>

<!-- ============================================================ -->
<!-- TAB: TRACKER -->
<!-- ============================================================ -->
<div id="tab-tracker" class="tab-content active">
  <div class="card">
    <div class="card-title">➕ 友達を追加</div>
    <div class="form-row">
      <div class="form-group">
        <label>プレイヤー名 *</label>
        <input id="t-name" type="text" placeholder="例：武田信玄">
      </div>
      <div class="form-group">
        <label>大名家</label>
        <input id="t-faction" type="text" placeholder="例：武田家">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>総兵力</label>
        <input id="t-troops" type="number" placeholder="例：150000" min="0">
      </div>
      <div class="form-group">
        <label>戦力値</label>
        <input id="t-power" type="number" placeholder="例：85000" min="0">
      </div>
      <div class="form-group">
        <label>武将数</label>
        <input id="t-generals" type="number" placeholder="例：45" min="0">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>メモ</label>
        <input id="t-memo" type="text" placeholder="例：攻略協力中">
      </div>
    </div>
    <button class="btn btn-primary" onclick="addTracker()">追加する</button>
  </div>

  <div id="tracker-stats" class="stats-bar"></div>

  <div class="card">
    <div class="card-title">👥 戦力一覧 <span style="font-size:0.75rem;color:var(--text2);font-weight:normal">（列名クリックで並び替え）</span></div>
    <div id="tracker-wrap" class="tracker-wrap"></div>
  </div>
</div>

<!-- ============================================================ -->
<!-- TAB: NOTES -->
<!-- ============================================================ -->
<div id="tab-notes" class="tab-content">
  <div class="card">
    <div class="card-title">📝 新規メモ</div>
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label>タイトル *</label>
        <input id="n-title" type="text" placeholder="例：武田家との同盟について">
      </div>
      <div class="form-group">
        <label>カテゴリ</label>
        <select id="n-cat">
          <option>戦略</option>
          <option>武将</option>
          <option>内政</option>
          <option>外交</option>
          <option>その他</option>
        </select>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:10px">
      <label>内容</label>
      <textarea id="n-body" placeholder="攻略メモを入力..."></textarea>
    </div>
    <button class="btn btn-primary" onclick="addNote()">メモを保存</button>
  </div>

  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="note-search" placeholder="タイトル・内容・カテゴリで検索..." oninput="renderNotes()">
  </div>

  <div id="notes-grid" class="notes-grid"></div>
</div>

<!-- ============================================================ -->
<!-- TAB: SIMULATOR -->
<!-- ============================================================ -->
<div id="tab-simulator" class="tab-content">
  <div class="card">
    <div class="card-title">⚔️ 戦法シミュレーター</div>
    <p style="font-size:0.81rem;color:var(--text2);margin-bottom:12px">戦法カードをクリックして選択（最大4つ）。名前で検索・フィルタ可能。</p>

    <div style="font-size:0.82rem;color:var(--text2);margin-bottom:6px">✅ 選択中の戦法</div>
    <div id="selected-slot" class="selected-slot">
      <span style="color:var(--text2);font-size:0.8rem">戦法を選んでください</span>
    </div>

    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
      <div style="flex:1;min-width:160px">
        <div class="search-bar" style="margin-bottom:0">
          <span class="search-icon">🔍</span>
          <input type="text" id="sim-search" placeholder="戦法名・武将名で検索..." oninput="renderTactics()">
        </div>
      </div>
    </div>

    <div class="type-filter" style="margin-bottom:6px">
      <span style="font-size:0.75rem;color:var(--text2);align-self:center;margin-right:4px">ランク:</span>
      <button class="type-filter-btn active" onclick="setRankFilter('全て',this)">全て</button>
      <button class="type-filter-btn" onclick="setRankFilter('SS',this)">SS</button>
      <button class="type-filter-btn" onclick="setRankFilter('S',this)">S</button>
      <button class="type-filter-btn" onclick="setRankFilter('A',this)">A</button>
      <button class="type-filter-btn" onclick="setRankFilter('B',this)">B</button>
    </div>

    <div class="type-filter" style="margin-bottom:6px">
      <span style="font-size:0.75rem;color:var(--text2);align-self:center;margin-right:4px">種類:</span>
      <button class="type-filter-btn active" onclick="setTypeFilter('全て',this)">全て</button>
      <button class="type-filter-btn" onclick="setTypeFilter('固有',this)">👑 固有</button>
      <button class="type-filter-btn" onclick="setTypeFilter('伝授',this)">📖 伝授</button>
      <button class="type-filter-btn" onclick="setTypeFilter('事件',this)">⚡ 事件</button>
    </div>

    <div class="type-filter" style="margin-bottom:12px">
      <span style="font-size:0.75rem;color:var(--text2);align-self:center;margin-right:4px">発動:</span>
      <button class="type-filter-btn active" onclick="setKindFilter('全て',this)">全て</button>
      <button class="type-filter-btn" onclick="setKindFilter('能動',this)">⚔️ 能動</button>
      <button class="type-filter-btn" onclick="setKindFilter('受動',this)">🛡️ 受動</button>
      <button class="type-filter-btn" onclick="setKindFilter('指揮',this)">📣 指揮</button>
      <button class="type-filter-btn" onclick="setKindFilter('突撃',this)">💨 突撃</button>
      <button class="type-filter-btn" onclick="setKindFilter('兵種',this)">🐴 兵種</button>
    </div>

    <div id="sim-count" style="font-size:0.78rem;color:var(--text2);margin-bottom:8px"></div>
    <div id="tactic-grid" class="tactic-grid"></div>
  </div>
</div>

<!-- ============================================================ -->
<!-- TAB: RIVALS -->
<!-- ============================================================ -->
<div id="tab-rivals" class="tab-content">
  <div class="card">
    <div class="card-title">➕ ライバルを追加</div>
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label>プレイヤー名 / 大名 *</label>
        <input id="r-name" type="text" placeholder="例：上杉謙信">
      </div>
      <div class="form-group">
        <label>脅威度</label>
        <select id="r-threat">
          <option>高</option>
          <option>中</option>
          <option>低</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>推定兵力</label>
        <input id="r-troops" type="text" placeholder="例：200000">
      </div>
      <div class="form-group">
        <label>主力戦法</label>
        <input id="r-tactic" type="text" placeholder="例：騎突、火矢">
      </div>
    </div>
    <div class="form-group" style="margin-bottom:8px">
      <label>対策メモ</label>
      <textarea id="r-memo" placeholder="弱点・対策・注意点など..." style="min-height:60px"></textarea>
    </div>
    <div class="form-group" style="margin-bottom:10px">
      <label>スクリーンショット（任意）</label>
      <input type="file" id="r-img" accept="image/*">
    </div>
    <button class="btn btn-primary" onclick="addRival()">ライバルを登録</button>
  </div>

  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="rival-search" placeholder="名前・戦法・メモで検索..." oninput="renderRivals()">
  </div>

  <div id="rivals-grid" class="rivals-grid"></div>
</div>

<div id="toast" class="toast"></div>

<script>
// ============================================================
// DATA
// ============================================================

let trackerData = lsLoad('sz_tracker');

// ============================================================
// STORAGE
// ============================================================
function lsSave(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} }
function lsLoad(k)    { try { return JSON.parse(localStorage.getItem(k)) || []; } catch(e){ return []; } }

// ============================================================
// UTILS
// ============================================================
function showTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2600);
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function fmtNum(n) {
  if (!n && n !== 0) return '—';
  return Number(n).toLocaleString('ja-JP');
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function today() { return new Date().toLocaleDateString('ja-JP'); }

// TRACKER
// ============================================================
function addTracker() {
  const name = document.getElementById('t-name').value.trim();
  if (!name) { toast('⚠️ プレイヤー名を入力してください'); return; }
  trackerData.push({
    id: uid(), name,
    faction:  document.getElementById('t-faction').value.trim(),
    troops:   parseInt(document.getElementById('t-troops').value)   || 0,
    power:    parseInt(document.getElementById('t-power').value)    || 0,
    generals: parseInt(document.getElementById('t-generals').value) || 0,
    memo:     document.getElementById('t-memo').value.trim(),
    updated:  today()
  });
  lsSave('sz_tracker', trackerData);
  ['t-name','t-faction','t-troops','t-power','t-generals','t-memo'].forEach(id => document.getElementById(id).value = '');
  renderTracker();
  toast('✅ 追加しました！');
}

function deleteTracker(id) {
  if (!confirm('削除しますか？')) return;
  trackerData = trackerData.filter(r => r.id !== id);
  lsSave('sz_tracker', trackerData);
  renderTracker();
}

function sortBy(col) {
  trackerSort = trackerSort.col === col
    ? { col, asc: !trackerSort.asc }
    : { col, asc: false };
  renderTracker();
}

function renderTracker() {
  const wrap  = document.getElementById('tracker-wrap');
  const stats = document.getElementById('tracker-stats');

  if (!trackerData.length) {
    wrap.innerHTML = '<div class="empty"><div class="icon">⚔️</div><div class="msg">友達を追加してください</div></div>';
    stats.innerHTML = '';
    return;
  }

  const sorted = [...trackerData].sort((a,b) => {
    const av = typeof a[trackerSort.col] === 'number' ? a[trackerSort.col] : (a[trackerSort.col]||'').localeCompare(b[trackerSort.col]||'');
    const bv = typeof b[trackerSort.col] === 'number' ? b[trackerSort.col] : 0;
    if (typeof a[trackerSort.col] === 'string') return trackerSort.asc ? (a[trackerSort.col]||'').localeCompare(b[trackerSort.col]||'') : (b[trackerSort.col]||'').localeCompare(a[trackerSort.col]||'');
    return trackerSort.asc ? a[trackerSort.col] - b[trackerSort.col] : b[trackerSort.col] - a[trackerSort.col];
  });

  const maxPow   = Math.max(...trackerData.map(r => r.power), 1);
  const totalTrp = trackerData.reduce((s,r) => s + r.troops, 0);
  const avgPow   = Math.round(trackerData.reduce((s,r) => s + r.power, 0) / trackerData.length);

  stats.innerHTML = `
    <div class="stat-chip">人数: <span>${trackerData.length}</span></div>
    <div class="stat-chip">兵力合計: <span>${fmtNum(totalTrp)}</span></div>
    <div class="stat-chip">平均戦力: <span>${fmtNum(avgPow)}</span></div>
  `;

  const ar = col => trackerSort.col === col ? (trackerSort.asc ? ' ↑' : ' ↓') : '';

  let html = `<table class="tracker-table"><thead><tr>
    <th style="width:36px">#</th>
    <th onclick="sortBy('name')">名前${ar('name')}</th>
    <th onclick="sortBy('faction')">大名家${ar('faction')}</th>
    <th onclick="sortBy('troops')">兵力${ar('troops')}</th>
    <th onclick="sortBy('power')">戦力${ar('power')}</th>
    <th onclick="sortBy('generals')">武将${ar('generals')}</th>
    <th>メモ</th>
    <th style="width:60px">操作</th>
  </tr></thead><tbody>`;

  sorted.forEach((r, i) => {
    const pct   = Math.round((r.power / maxPow) * 100);
    const badge = i === 0 ? '<span class="rank-badge">👑 首位</span>' : '';
    html += `<tr>
      <td style="color:var(--text2);font-size:0.8rem">${i+1}</td>
      <td><strong${i===0?' class="rank-1"':''}>${esc(r.name)}</strong>${badge}</td>
      <td style="color:var(--text2)">${esc(r.faction)||'—'}</td>
      <td>${fmtNum(r.troops)}</td>
      <td>
        ${fmtNum(r.power)}
        <div class="power-bar"><div class="power-bar-fill" style="width:${pct}%"></div></div>
      </td>
      <td>${r.generals||'—'}</td>
      <td style="color:var(--text2);font-size:0.79rem">${esc(r.memo)}</td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteTracker('${r.id}')">削除</button></td>
    </tr>`;
  });

  wrap.innerHTML = html + '</tbody></table>';
}

function addNote() {
  const title = document.getElementById('n-title').value.trim();
  if (!title) { toast('⚠️ タイトルを入力してください'); return; }

    id: uid(),
    title,
    cat:   document.getElementById('n-cat').value,
    body:  document.getElementById('n-body').value,

  });
  lsSave('sz_notes', notesData);
  document.getElementById('n-title').value = '';

  renderNotes();
  toast('✅ メモを保存しました');

function deleteNote(id) {
  if (!confirm('削除しますか？')) return;
  notesData = notesData.filter(n => n.id !== id);
  lsSave('sz_notes', notesData);
  renderNotes();
}

function renderNotes() {
  const grid = document.getElementById('notes-grid');
  const q    = document.getElementById('note-search').value.toLowerCase();
  const list = notesData.filter(n =>
    !q || n.title.toLowerCase().includes(q) || (n.body||'').toLowerCase().includes(q) || n.cat.includes(q)
  );
  if (!list.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="icon">📝</div><div class="msg">${q ? '該当するメモがありません' : 'メモを追加してください'}</div></div>`;
    return;
  }
  grid.innerHTML = list.map(n => `
    <div class="note-card cat-${esc(n.cat)}">
      <div class="note-title">${esc(n.title)}</div>
      <div class="note-body">${esc(n.body)}</div>
      <div class="note-footer">
        <div>
          <span class="cat-tag">${esc(n.cat)}</span>
          <span style="font-size:0.7rem;color:var(--text2);margin-left:8px">${n.date}</span>
        </div>
        <button class="btn btn-danger btn-sm" onclick="deleteNote('${n.id}')">削除</button>
      </div>
    </div>
  `).join('');
}

function toggleTactic(id) {
  const idx = selTactics.indexOf(id);
  if (idx >= 0) {
    selTactics.splice(idx, 1);
  } else {
    if (selTactics.length >= 4) { toast('⚠️ 最大4つまで選択できます'); return; }
    selTactics.push(id);
  }
  renderTactics();
  renderSelSlot();
}

        <span class="kind-badge">${kindIcon(t.kind)}${t.kind}</span>
      </div>
      ${t.source ? `<div style="font-size:0.68rem;color:var(--gold);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(t.source)}">🧑‍💼 ${esc(t.source)}</div>` : ''}
      <div class="tactic-effect-label" style="margin-top:4px;font-size:0.68rem">${esc(t.effect)}</div>
      <div style="font-size:0.66rem;color:var(--text2);margin-top:3px">発動確率：${t.prob}</div>
      ${sel ? `<div style="font-size:0.68rem;margin-top:4px;color:${colors[si]};display:flex;justify-content:space-between;align-items:center"><span>✓ ${si+1}番目に選択</span><span style="background:rgba(255,255,255,0.15);border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:0.7rem">✕</span></div>` : ''}
    </div>`;
  }).join('') || '<div class="empty" style="grid-column:1/-1"><div class="icon">⚔️</div><div class="msg">該当する戦法がありません</div></div>';
}

function renderSelSlot() {
  const el = document.getElementById('selected-slot');
  const colors = ['var(--gold)','var(--red)','#4090c0','#50a870'];
  if (!selTactics.length) {
    el.innerHTML = '<span style="color:var(--text2);font-size:0.8rem">戦法を選んでください</span>';
    return;
  }
  el.innerHTML = selTactics.map((id, i) => {
    const t = TACTICS.find(x => x.id === id);
    return `<span class="slot-tag" style="background:rgba(0,0,0,0.35);border:1px solid ${colors[i]};color:${colors[i]}" onclick="toggleTactic(${id})">
      ${esc(t.name)} ✕
    </span>`;
  }).join('');
}

// ============================================================
// RIVALS
// ============================================================
function addRival() {
  const name = document.getElementById('r-name').value.trim();
  if (!name) { toast('⚠️ 名前を入力してください'); return; }

  const file = document.getElementById('r-img').files[0];
  const finish = (imgData) => {
    rivalsData.unshift({
      id:     uid(),
      name,
      threat: document.getElementById('r-threat').value,
      troops: document.getElementById('r-troops').value.trim(),
      tactic: document.getElementById('r-tactic').value.trim(),
      memo:   document.getElementById('r-memo').value.trim(),
      image:  imgData || null,
      date:   today()
    });
    lsSave('sz_rivals', rivalsData);
    ['r-name','r-troops','r-tactic','r-memo'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('r-img').value = '';
    renderRivals();
    toast('✅ ライバルを登録しました！');
  };

  if (file) {
    const reader = new FileReader();
    reader.onload = e => finish(e.target.result);
    reader.readAsDataURL(file);
  } else {
    finish(null);
  }
}

function deleteRival(id) {
  if (!confirm('削除しますか？')) return;
  rivalsData = rivalsData.filter(r => r.id !== id);
  lsSave('sz_rivals', rivalsData);
  renderRivals();
}

function renderRivals() {
  const grid = document.getElementById('rivals-grid');
  const q    = document.getElementById('rival-search').value.toLowerCase();
  const list = rivalsData.filter(r =>
    !q ||
    r.name.toLowerCase().includes(q) ||
    (r.tactic||'').toLowerCase().includes(q) ||
    (r.memo||'').toLowerCase().includes(q)
  );

  if (!list.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="icon">🔍</div><div class="msg">${q ? '該当するライバルがいません' : 'ライバルを追加してください'}</div></div>`;
    return;
  }

  grid.innerHTML = list.map(r => `
    <div class="rival-card">
      ${r.image
        ? `<div class="rival-thumb"><img src="${r.image}" alt="${esc(r.name)}"></div>`
        : `<div class="rival-thumb">⚔️</div>`
      }
      <span class="threat-badge threat-${esc(r.threat)}">脅威：${esc(r.threat)}</span>
      <div class="rival-info">
        <div class="rival-name">${esc(r.name)}</div>
        <div class="rival-stat">
          ${r.troops ? `兵力：${esc(r.troops)}<br>` : ''}
          ${r.tactic ? `戦法：${esc(r.tactic)}<br>` : ''}
          ${r.memo   ? `<span style="color:var(--text2)">${esc(r.memo)}</span>` : ''}
        </div>
        <div class="rival-actions">
          <button class="btn btn-danger btn-sm" onclick="deleteRival('${r.id}')">削除</button>
          <span style="font-size:0.69rem;color:var(--text2)">${r.date}</span>
        </div>
      </div>
    </div>
  `).join('');
}

// ============================================================
// INIT
// ============================================================
renderTracker();
renderNotes();
renderTactics();
renderSelSlot();
renderRivals();
</script>
</body>
</html>
